server:
  port: ${cy.server.port}

spring:
  profiles:
    active: dev
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: sk-5f1b3d692f5c4dde843cf319a962b05c

      chat:
        options:
          model: ${CHAT_MODEL:qwen-vl-max}
          temperature: 0.3


  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: ${cy.datasource.driver-class-name}
    url: jdbc:mysql://${cy.datasource.host}:${cy.datasource.port}/${cy.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${cy.datasource.username}
    password: ${cy.datasource.password}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 1000MB
  data:
    redis:
      host: ${cy.redis.host}
      port: ${cy.redis.port}
      password: ${cy.redis.password}
      database: ${cy.redis.database}


mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.cy.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  config: classpath:logback-spring.xml
  level:
    com:
      cy:
        mapper: debug
        service: info
        controller: info
        org.springframework.ai.chat.client.advisor: error
        com.cy: debug


cy:
  ai:
    rag:
      enabled: true
      top-k: 3
      max-snippet-length: 220
      resource-path: rag/food-knowledge.json

  alioss:
    endpoint: ${cy.alioss.endpoint}
    access-key-id: ${cy.alioss.access-key-id}
    access-key-secret: ${cy.alioss.access-key-secret}
    bucket-name: ${cy.alioss.bucket-name}

  jwt:
    # 设置jwt签名加密时使用的秘钥
    secret-key: HeatRecognition
    # 设置jwt过期时间
    ttl: 720000000000
    # 设置前端传递过来的令牌名称
    token-name: token
    ignore-paths:
      - /auth/**


